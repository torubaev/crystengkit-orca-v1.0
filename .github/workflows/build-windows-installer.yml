name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-windows-installer.yml"
      - "packaging/windows/**"

permissions:
  contents: write

concurrency:
  group: windows-installer-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build unsigned installer
        shell: powershell
        run: |
          & .\packaging\windows\build_web_installer.ps1 -AllowUnsigned

      - name: Validate single-file x86 executable
        shell: powershell
        run: |
          $releaseDir = Resolve-Path "install\releases"
          $installer = Join-Path $releaseDir "CrystEngKit-ORCA-WebSetup-1.0.2.exe"
          $files = @(Get-ChildItem -LiteralPath $releaseDir -File)
          if ($files.Count -ne 1 -or $files[0].FullName -ne $installer) {
            throw "Expected exactly one installer EXE in install\releases."
          }
          $bytes = [IO.File]::ReadAllBytes($installer)
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          if ($machine -ne 0x014c) {
            throw ("Expected AnyCPU PE machine 0x014C, found 0x{0:X4}." -f $machine)
          }
          $probe = Start-Process -FilePath $installer -ArgumentList "/probe" -Wait -PassThru
          if ($probe.ExitCode -ne 0) {
            throw "Installer launch probe failed with exit code $($probe.ExitCode)."
          }
          Get-FileHash -LiteralPath $installer -Algorithm SHA256

      - name: Commit rebuilt installer
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add install/releases/CrystEngKit-ORCA-WebSetup-1.0.2.exe
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Installer is already current."
            exit 0
          }
          git commit -m "Rebuild Windows installer for broad compatibility"
          git push origin HEAD:main
